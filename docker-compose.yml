services:
  db:
    image: postgres:16-alpine
    container_name: padaria-belfort-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-db_padaria_belfort}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: padaria-api
    restart: unless-stopped
    env_file:
      - ./API/.env
    environment:
      PORT: 3503
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-db_padaria_belfort}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
    ports:
      - "3503:3503"
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./Front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3503}
    container_name: padaria-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
